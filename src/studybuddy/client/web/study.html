<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>学习中 — StudyBuddy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #4F46E5;
            --bg: #0F172A;
            --card: #1E293B;
            --text: #F1F5F9;
            --text-secondary: #94A3B8;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        .study-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--card);
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-studying { background: rgba(16,185,129,0.15); color: var(--success); }
        .status-break { background: rgba(245,158,11,0.15); color: var(--warning); }
        .status-nudge { background: rgba(239,68,68,0.15); color: var(--danger); }
        .status-briefing { background: rgba(79,70,229,0.15); color: var(--primary); }
        .status-done { background: rgba(16,185,129,0.15); color: var(--success); }

        .task-info {
            font-size: 15px;
            font-weight: 500;
        }

        .camera-area {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cameraPreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .camera-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
        }

        .timer-display {
            text-align: center;
        }

        .timer-time {
            font-size: 48px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
        }

        .timer-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            border-radius: 2px;
            transition: width 1s linear;
        }

        .bottom-bar {
            padding: 16px;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .task-progress {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .nudge-counter {
            font-size: 14px;
            color: var(--warning);
        }

        .connection-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
        }

        .connection-status.connected { background: var(--success); }

        .ai-speaking {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(79,70,229,0.9);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
        }

        .ai-speaking.show { display: block; }

        .init-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            gap: 16px;
        }

        .init-overlay.hidden { display: none; }

        .init-overlay .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--card);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .init-overlay p {
            color: var(--text-secondary);
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="init-overlay" id="initOverlay">
        <div class="spinner"></div>
        <p id="initStatus">正在连接...</p>
    </div>

    <div class="study-layout">
        <div class="top-bar">
            <span class="status-badge status-briefing" id="statusBadge">准备中</span>
            <span class="task-info" id="taskInfo">等待连接...</span>
            <div class="connection-status" id="connStatus"></div>
        </div>

        <div class="camera-area">
            <video id="cameraPreview" autoplay playsinline muted></video>

            <div class="ai-speaking" id="aiSpeaking">AI 正在说话...</div>

            <div class="camera-overlay">
                <div class="timer-display">
                    <div class="timer-time" id="timerTime">--:--</div>
                    <div class="timer-label" id="timerLabel">等待开始</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <span class="task-progress" id="taskProgress">任务 -/-</span>
            <span class="nudge-counter" id="nudgeCount">提醒 0 次</span>
        </div>
    </div>

    <!--
        火山引擎 RTC Web SDK
        生产环境请替换为具体版本的 CDN 地址，如：
        https://lf-cdn-tos.bytescm.com/obj/static/web_advance/@AgoraIO/veRTC-SDK-Web/latest/veRTC.min.js
        当前使用占位引入，实际部署时需从火山引擎控制台获取 SDK
    -->
    <script src="https://lf-cdn-tos.bytescm.com/obj/static/web_advance/veRTC/latest/veRTC.min.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session');

        if (!sessionId) {
            alert('缺少 session 参数');
            window.location.href = '/';
        }

        let statusWs = null;
        let rtcEngine = null;
        let mediaStream = null;

        const STATUS_MAP = {
            'plan_ready': { text: '准备中', class: 'status-briefing' },
            'task_briefing': { text: '任务介绍', class: 'status-briefing' },
            'studying': { text: '学习中', class: 'status-studying' },
            'nudge': { text: '请专注', class: 'status-nudge' },
            'break_time': { text: '休息中', class: 'status-break' },
            'all_done': { text: '完成!', class: 'status-done' },
            'report_sent': { text: '已完成', class: 'status-done' },
        };

        async function init() {
            try {
                updateInitStatus('正在获取摄像头权限...');
                await setupCamera();

                updateInitStatus('正在获取 RTC Token...');
                const tokenInfo = await fetchRTCToken();

                updateInitStatus('正在加入 RTC 房间...');
                await joinRTCRoom(tokenInfo);

                updateInitStatus('正在启动 AI 监督...');
                await startStudySession(tokenInfo);

                setupStatusWebSocket();

                document.getElementById('initOverlay').classList.add('hidden');
            } catch (e) {
                updateInitStatus('连接失败: ' + e.message);
                console.error('Init error:', e);
            }
        }

        function updateInitStatus(text) {
            document.getElementById('initStatus').textContent = text;
        }

        async function setupCamera() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 },
                    audio: true,
                });
                document.getElementById('cameraPreview').srcObject = mediaStream;
            } catch (e) {
                console.error('Camera error:', e);
            }
        }

        async function fetchRTCToken() {
            const resp = await fetch('/api/rtc/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId }),
            });
            if (!resp.ok) throw new Error('获取 Token 失败');
            return await resp.json();
        }

        async function joinRTCRoom(tokenInfo) {
            if (typeof VERTC === 'undefined') {
                console.warn('RTC SDK not loaded, running in demo mode');
                return;
            }

            rtcEngine = VERTC.createEngine(tokenInfo.app_id);

            rtcEngine.on(VERTC.events.onUserJoined, (event) => {
                console.log('User joined:', event.userId);
            });

            rtcEngine.on(VERTC.events.onUserLeave, (event) => {
                console.log('User left:', event.userId);
            });

            rtcEngine.on(VERTC.events.onAutoplayFailed, () => {
                console.warn('Autoplay failed, user interaction needed');
            });

            await rtcEngine.joinRoom(tokenInfo.token, tokenInfo.room_id, {
                userId: tokenInfo.user_id,
            }, {
                isAutoPublish: true,
                isAutoSubscribeAudio: true,
                isAutoSubscribeVideo: false,
            });

            if (mediaStream) {
                const audioTrack = mediaStream.getAudioTracks()[0];
                const videoTrack = mediaStream.getVideoTracks()[0];
                if (audioTrack) {
                    await rtcEngine.publishStream(VERTC.MediaType.AUDIO);
                }
                if (videoTrack) {
                    await rtcEngine.publishStream(VERTC.MediaType.VIDEO);
                }
            }
        }

        async function startStudySession(tokenInfo) {
            const resp = await fetch('/api/study/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    session_id: sessionId,
                    room_id: tokenInfo.room_id,
                    child_user_id: tokenInfo.user_id,
                }),
            });
            const data = await resp.json();
            if (data.error) throw new Error(data.error);
        }

        function setupStatusWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            statusWs = new WebSocket(
                `${protocol}//${window.location.host}/ws/status/${sessionId}`
            );

            statusWs.onopen = () => {
                document.getElementById('connStatus').classList.add('connected');
            };

            statusWs.onclose = () => {
                document.getElementById('connStatus').classList.remove('connected');
                setTimeout(setupStatusWebSocket, 3000);
            };

            statusWs.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'status') updateUI(msg);
                if (msg.type === 'error') {
                    alert(msg.message);
                    window.location.href = '/';
                }
            };
        }

        function updateUI(status) {
            const stateInfo = STATUS_MAP[status.state] || { text: status.state, class: '' };
            const badge = document.getElementById('statusBadge');
            badge.textContent = stateInfo.text;
            badge.className = `status-badge ${stateInfo.class}`;

            if (status.current_task) {
                document.getElementById('taskInfo').textContent = status.current_task;
            }

            document.getElementById('taskProgress').textContent =
                `任务 ${(status.task_index || 0) + 1}/${status.task_total || 0}`;

            document.getElementById('nudgeCount').textContent =
                `提醒 ${status.nudge_count || 0} 次`;

            if (status.timer) {
                const remaining = Math.ceil(status.timer.remaining);
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                document.getElementById('timerTime').textContent =
                    `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                document.getElementById('timerLabel').textContent = status.timer.label;
                document.getElementById('progressFill').style.width =
                    `${(status.timer.progress * 100).toFixed(1)}%`;
            }

            if (status.state === 'report_sent') {
                setTimeout(() => {
                    window.location.href = `/report/${sessionId}`;
                }, 2000);
            }
        }

        init();
    </script>
</body>
</html>
